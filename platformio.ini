; Root compatibility config for VS Code / PlatformIO commands executed
; from repository root. Actual firmware config lives in `firmware/platformio.ini`.

[platformio]
default_envs = esp32-s3-devkitc-1
extra_configs = firmware/platformio.ini

; Map project directories to firmware subfolder
src_dir = firmware/src
include_dir = firmware/include
lib_dir = firmware/lib
boards_dir = firmware/boards
build_dir = .pio/build
libdeps_dir = .pio/libdeps
