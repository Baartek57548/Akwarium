name: Build and Release Firmware

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - "v*"

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Remove tracked PlatformIO artifacts
        run: rm -rf firmware/.pio

      - name: Build project
        run: pio run -d firmware

      - name: Verify firmware exists
        run: ls -lah firmware/.pio/build/esp32-s3-devkitc-1/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v6
        with:
          name: firmware
          path: firmware/.pio/build/esp32-s3-devkitc-1/firmware.bin

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/.pio/build/esp32-s3-devkitc-1/firmware.bin

  build-mobile-windows:
    name: Build MAUI app (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET SDK 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore MAUI project
        run: dotnet restore mobile-app/AquariumController.Mobile.csproj

      - name: Build MAUI Windows target
        run: dotnet build mobile-app/AquariumController.Mobile.csproj -f net10.0-windows10.0.19041.0 -c Release --no-restore
